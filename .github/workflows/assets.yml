name: Build assets

on:
  push:
    paths:
      - "assets/logo/svg/**"
      - "assets/logo/png/**"
      - "scripts/**"
      - ".github/workflows/assets.yml"
  pull_request:
    paths:
      - "assets/logo/svg/**"
      - "assets/logo/png/**"
      - "scripts/**"
      - ".github/workflows/assets.yml"
  workflow_dispatch:

jobs:
  pngs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SVG renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin imagemagick

      - name: Export PNGs
        run: node scripts/build-assets.mjs export-pngs

      - name: Validate generated PNGs
        run: |
          identify assets/logo/png/kamotalk-symbol-square.png | grep "1024x1024"
          identify assets/logo/png/kamotalk-symbol-square-transparent.png | grep "1024x1024"
          identify assets/logo/png/kamotalk-symbol.png | grep "475x438"
          identify assets/logo/png/kamotalk-logo-horizontal.png | grep "1116x256"
          identify assets/logo/png/kamotalk-wordmark-stacked.png | grep "494x288"
          identify assets/logo/png/kamotalk-wordmark.png | grep "845x139"
