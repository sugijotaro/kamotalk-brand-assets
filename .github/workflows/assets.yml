name: Build assets

on:
  push:
    paths:
      - "assets/logo/svg/**"
      - "assets/logo/png/**"
      - "scripts/**"
      - ".github/workflows/assets.yml"
  pull_request:
    paths:
      - "assets/logo/svg/**"
      - "assets/logo/png/**"
      - "scripts/**"
      - ".github/workflows/assets.yml"
  workflow_dispatch:

jobs:
  pngs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SVG renderer
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Export PNGs
        run: node scripts/build-assets.mjs export-pngs

      - name: Check generated PNGs
        run: git diff --exit-code -- assets/logo/png
