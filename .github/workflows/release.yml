name: Release assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick zip

      - name: Build release package
        run: node scripts/build-assets.mjs release-package

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            build/release/kamotalk-brand-assets.zip \
            --title "KamoTalk Brand Assets $RELEASE_TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"
