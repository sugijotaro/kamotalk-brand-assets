name: Release assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release dependencies
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin imagemagick zip

      - name: Build release package
        run: node scripts/build-assets.mjs release-package

      - name: Create release tag
        id: release_tag
        run: |
          tag="release-$(TZ=Asia/Tokyo date +'%Y%m%d-%H%M%S')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            build/release/kamotalk-brand-assets.zip \
            --title "KamoTalk Brand Assets $RELEASE_TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"

      - name: Publish GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: build/release/kamotalk-brand-assets
          force_orphan: true
