<?xml version="1.0" encoding="UTF-8"?>
<svg id="kamotalk-symbol-square" data-name="KamoTalk Symbol Square" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">KamoTalk square symbol</title>
  <desc id="desc">KamoTalk square brand asset with the KamoTalk symbol and wordmark.</desc>
  <defs>
    <style>
      .background-cream {
        fill: #faf3e3;
      }

      .brand-green {
        fill: #30a083;
      }

      .duck-orange {
        fill: #e9a350;
      }
    </style>
  </defs>
  <g id="base" data-name="Base">
    <rect id="background" data-name="Background" class="background-cream" width="1024" height="1024"/>
  </g>
  <image id="symbol" data-name="Symbol" href="kamotalk-symbol.svg" x="253" y="125" width="517.84" height="477.5"/>
  <image id="wordmark" data-name="Wordmark" href="kamotalk-wordmark-stacked.svg" x="266" y="619" width="494" height="288"/>
</svg>
