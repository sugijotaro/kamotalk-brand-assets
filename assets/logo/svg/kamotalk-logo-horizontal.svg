<?xml version="1.0" encoding="UTF-8"?>
<svg id="kamotalk-logo-horizontal" data-name="KamoTalk Logo Horizontal" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1116 256" role="img" aria-labelledby="title desc">
  <title id="title">KamoTalk horizontal logo</title>
  <desc id="desc">KamoTalk horizontal brand asset with the KamoTalk symbol and wordmark.</desc>
  <defs>
    <style>
      .brand-green {
        fill: #30a083;
      }

      .duck-cream {
        fill: #faf3e3;
      }

      .duck-orange {
        fill: #e9a350;
      }
    </style>
  </defs>
  <image id="symbol" data-name="Symbol" href="kamotalk-symbol.svg" x="0" y="1" width="276.4" height="254.96"/>
  <image id="wordmark" data-name="Wordmark" href="kamotalk-wordmark.svg" x="332" y="65" width="756" height="117"/>
</svg>
